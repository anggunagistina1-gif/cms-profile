<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login CMS</title>

<!-- CSS -->
<link rel="stylesheet" href="asset/css/login.css">
</head>

<body>

<div class="login-container">

    <div class="login-title">
        Login 
    </div>

    <form id="loginForm">

        <div class="input-box">
            <input 
                type="text" 
                id="username"
                placeholder="Username"
                required
            >
        </div>

        <div class="input-box">
            <input 
                type="password" 
                id="password"
                placeholder="Password"
                required
            >
        </div>

        <button type="submit" class="login-btn">
            Login
        </button>

        <div class="info">
            gunakan username : anggun agistina <br>
            password : sayacantik
        </div>

    </form>

</div>

<!-- JS -->
<script src="asset/js/login.js"></script>

</body>
</html>
